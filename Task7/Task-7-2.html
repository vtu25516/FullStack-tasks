<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Color change by Quadrants</title>
        <style>
            body{
                height: 100vh;
                margin: 0;
                display:flex;
                justify-content: center;
                align-items: center;
                font-family: sans-serif;
                transition: background-color 0.3s ease;
            }
            #cords{
                background: rgba(255, 255, 255, 0.8);
                padding:20px; 
                border-radius: 8px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div id="cords">
            <h2>Move your mouse</h2>
            <p id="position">X: 0, Y: 0</p>
            <p id="quadrant">Quadrant: -</p>
        </div>
        <script>
            const position=document.getElementById('position');
            const quadrant=document.getElementById('quadrant');
            globalThis.addEventListener('mousemove',(event)=>{
                const x=event.clientX;
                const y=event.clientY;
                position.textContent='X: '+x+', Y: '+y;
                const centerX=window.innerWidth/2;
                const centerY=window.innerHeight/2;
                if(x<centerX&&y<centerY){
                    document.body.style.backgroundColor='#ffcccc'; //light red
                    quadrant.textContent='Quadrant: Top-Left';
                } else if(x>=centerX&&y<centerY){
                    document.body.style.backgroundColor='#ccffcc'; //light green
                    quadrant.textContent='Quadrant: Top-Right';
                } else if(x<centerX&&y>=centerY){
                    document.body.style.backgroundColor='lightblue'; //light blue
                    quadrant.textContent='Quadrant: Bottom-Left';
                } else {
                    document.body.style.backgroundColor='#ffffcc'; //light yellow
                    quadrant.textContent='Quadrant: Bottom-Right';
                }
            });
        </script>
    </body>
</html>
