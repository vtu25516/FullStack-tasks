<!DOCTYPE html>
<html>
<head>
    <title>Transaction Payment</title>
</head>
<body>

<h2>Transaction-Based Payment Simulation</h2>

<form id="paymentForm">
    <label>User ID</label><br>
    <input type="number" id="userId" required><br><br>

    <label>Merchant ID</label><br>
    <input type="number" id="merchantId" required><br><br>

    <label>Amount</label><br>
    <input type="number" id="amount" required><br><br>

    <button type="submit">Pay</button>
</form>

<h3 id="result"></h3>

<script>
document.getElementById("paymentForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const userId = document.getElementById("userId").value;
    const merchantId = document.getElementById("merchantId").value;
    const amount = document.getElementById("amount").value;

    const response = await fetch("/pay", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ userId, merchantId, amount })
    });

    const data = await response.text();
    document.getElementById("result").innerText = data;
});
</script>

</body>
</html>
